name: 用户：体验建议
description: 描述 LanJing 桌面端或移动端中的真实使用困扰与希望改善的结果
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        好的建议先说明使用场景和当前困难，再说明希望达到的效果。界面草图、按钮位置和技术方案都可以补充，但不是必填项。

  - type: checkboxes
    id: before-proposing
    attributes:
      label: 提交前确认
      options:
        - label: 我已搜索现有建议，没有找到相同使用场景
          required: true
        - label: 这不是安全漏洞、使用求助或单纯的配置问题
          required: true

  - type: textarea
    id: situation
    attributes:
      label: 使用场景
      description: 谁在什么平台和系统中，想完成什么事情？
      placeholder: 我通常在 Android 平板阅读长篇小说，同时播放环境音乐……
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: 目前的困难
      description: 现有体验哪里不顺、需要绕行，或导致什么结果？
      placeholder: 切换到阅读器后……，所以我不得不……
    validations:
      required: true

  - type: textarea
    id: outcome
    attributes:
      label: 希望达到的效果
      description: 描述改善后你能够完成什么，以及怎样算真正解决；不必先指定界面或技术方案。
      placeholder: 希望在……时仍能……，并且……
    validations:
      required: true

  - type: dropdown
    id: platforms
    attributes:
      label: 主要运行平台
      multiple: true
      options:
        - 桌面端 / Windows
        - 桌面端 / macOS
        - 桌面端 / Linux
        - 移动端 / iOS
        - 移动端 / Android
    validations:
      required: true

  - type: textarea
    id: system-information
    attributes:
      label: 系统信息
      description: 汇总系统版本、设备型号和应用版本；没有特殊信息时简要填写即可。
      placeholder: Android 15，Pixel Tablet，LanJing 0.3.0
    validations:
      required: true

  - type: textarea
    id: current-workaround
    attributes:
      label: 现在如何处理
      description: 有临时替代方法时请说明；没有可留空。

  - type: textarea
    id: boundaries
    attributes:
      label: 不能接受的结果
      description: 哪些隐私风险、性能损失、平台差异或操作变化会让这个改进失去价值？

  - type: textarea
    id: idea
    attributes:
      label: 方案设想
      description: 可以补充你想到的交互、参考产品或替代办法，但维护者会根据桌面端与移动端的整体产品边界评估。

  - type: textarea
    id: evidence
    attributes:
      label: 参考材料
      description: 可添加截图、录屏、原型或相关讨论；没有可留空。
