name: 维护者：需求说明
description: 把已确认的用户问题收敛为可拆分、可验证的需求说明
title: ''
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        本表单面向维护者。正文先讲用户和问题，再记录范围、约束、取舍与验证方式。所有自然语言使用符合中文习惯的表达，不写内部工具调用。

  - type: textarea
    id: problem
    attributes:
      label: 要解决的问题
      description: 说明受影响的人、典型场景、当前困难和实际影响。不要从组件或技术方案开始。
    validations:
      required: true

  - type: textarea
    id: scenarios
    attributes:
      label: 典型使用场景
      description: 按自然语言列出主要场景，包含桌面端或移动端、操作系统、输入方式、内容状态与失败情况。
      placeholder: |
        - 用户在移动端浏览资料库时，需要始终能够回到一级导航。
        - 没有可播放资源时，界面应明确说明原因，不显示空播放器。
    validations:
      required: true

  - type: textarea
    id: outcomes
    attributes:
      label: 期望达到的效果
      description: 写出完成后用户能够做什么、系统需要保证什么，以及如何判断问题已经解决。
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: 本次范围
      description: 分别写清本次包含和明确不包含的内容。
      placeholder: |
        包含：
        - ……

        不包含：
        - ……
    validations:
      required: true

  - type: textarea
    id: experience
    attributes:
      label: 体验要求
      description: 说明 Windows、macOS、Linux、iOS、Android、键盘鼠标、触控、主题、辅助偏好，以及加载、空状态和失败状态中的一致性要求。
    validations:
      required: true

  - type: textarea
    id: constraints
    attributes:
      label: 需要保持的约束
      description: 记录领域边界、数据所有权、权威模型、兼容性、安全和生产数据要求。
    validations:
      required: true

  - type: textarea
    id: decisions
    attributes:
      label: 已确认的方案与取舍
      description: 记录已经决定采用、放弃或延期的方向，并说明原因。不要写易失效的文件路径和按层实现清单。
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: 验收场景
      description: 使用可以观察和判定的中文句子，覆盖正常、边界、空状态与相关失败状态。
      placeholder: |
        - [ ] 用户在移动端切换横竖方向后，仍能看到并使用一级导航。
        - [ ] 没有音频会话时，页面不保留播放器高度。
    validations:
      required: true

  - type: textarea
    id: verification
    attributes:
      label: 验证范围
      description: 写明最高价值测试边界、自动化状态矩阵和必须人工确认的设备或视觉行为。
      placeholder: |
        主要测试边界：……
        自动化覆盖：……
        人工确认：……
    validations:
      required: true

  - type: textarea
    id: references
    attributes:
      label: 依据与参考
      description: 链接原型、用户反馈、领域文档、架构决策或研究资料；没有时填写“无”。
      placeholder: 无
    validations:
      required: true

  - type: checkboxes
    id: quality
    attributes:
      label: 发布前确认
      options:
        - label: 正文从用户场景和问题出发，没有机械套用翻译腔模板
          required: true
        - label: 范围、约束、验收场景和验证范围彼此一致
          required: true
        - label: 正文没有内部工具调用、提示词、密钥或私人数据
          required: true
