name: 问题反馈
description: 反馈桌面端或移动端中可稳定复现的问题
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        览境是本地优先的多端应用，支持 Windows、macOS、Linux、iOS 与 Android，不提供网页版。

        请写清：你当时在做什么、实际发生了什么、你原本期望什么。不必先判断技术原因。
        提交前请脱敏截图、日志和配置。如涉及安全漏洞，请走「安全漏洞报告」入口，不要创建公开议题。

  - type: checkboxes
    id: before-reporting
    attributes:
      label: 提交前确认
      options:
        - label: 我已搜索过现有议题，未发现相同反馈
          required: true
        - label: 本议题只描述一个可单独处理的问题
          required: true
        - label: 我已删除截图、日志和配置中的隐私信息与凭据
          required: true

  - type: textarea
    id: summary
    attributes:
      label: 问题概述
      description: 说明你当时在做什么、问题出现在哪里，以及它如何影响使用。
      placeholder: 我在……时，界面 / 阅读 / 播放……，导致……
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: 复现步骤
      description: 从启动应用写起，给出他人可照做的最短步骤。
      value: |
        1. 启动览境
        2. 进入……
        3. 执行……
        4. 出现……
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: 实际表现
      description: 写出最终看到或听到的结果，例如提示文字、界面状态、播放状态或错误信息。
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 预期表现
      description: 写出你认为正确、且可观察的结果。无需提供技术方案。
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: 运行平台
      options:
        - Windows
        - macOS
        - Linux
        - iOS
        - Android
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: 环境信息
      description: 请填写系统、设备与应用版本。若与布局有关，可补充横竖方向、缩放比例或窗口大小。
      value: |
        系统版本：
        设备型号：
        应用版本或提交：
        安装来源或构建方式：
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: 问题区域
      options:
        - 启动与系统集成
        - 全局导航与搜索
        - 境场
        - 资料库
        - 小说与阅读
        - 音乐与播放
        - 来源与规则
        - 文件、权限或原生能力
        - 其他
    validations:
      required: true

  - type: textarea
    id: media-context
    attributes:
      label: 媒体与来源（可选）
      description: 若问题出现在阅读、解析、下载或播放过程中，请说明媒体类型、来源类型与出问题的阶段。请勿粘贴未脱敏的配置。
      placeholder: 小说；本地测试来源；打开章节时；多数书籍可复现

  - type: textarea
    id: evidence
    attributes:
      label: 截图、录屏或脱敏日志（可选）
      description: 请附上能直接说明问题的证据。日志只需保留问题前后的相关片段。

  - type: textarea
    id: additional
    attributes:
      label: 其他补充（可选）
      description: 可补充复现频率、临时绕过方式，或在不同系统上的对比情况。
