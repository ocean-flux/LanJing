name: 问题反馈
description: 报告桌面端或移动端中可以稳定复现的问题
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        览境是本地优先的多端应用（Windows / macOS / Linux / iOS / Android），不提供网页端。

        请描述你在做什么、实际发生了什么、原本期待什么。无需先判断技术原因。
        截图、日志和配置请先脱敏。安全漏洞请走私密安全报告入口，不要开公开议题。

  - type: checkboxes
    id: before-reporting
    attributes:
      label: 提交前确认
      options:
        - label: 已搜索现有议题，没有找到相同反馈
          required: true
        - label: 本议题只描述一个可独立处理的问题
          required: true
        - label: 已删除截图、日志和配置中的隐私信息与凭据
          required: true

  - type: textarea
    id: summary
    attributes:
      label: 问题概述
      description: 当时在做什么、问题出现在哪里、如何影响使用。
      placeholder: 我在……时，界面 / 阅读 / 播放……，导致……
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: 如何复现
      description: 从启动应用开始，写出别人能照着完成的最短步骤。
      value: |
        1. 启动览境
        2. 进入……
        3. 执行……
        4. 出现……
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: 实际表现
      description: 最终看到或听到的结果，包括提示文字、界面状态、播放状态或错误信息。
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 预期表现
      description: 你认为正确且可观察的结果，无需提供技术方案。
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: 运行平台
      options:
        - Windows
        - macOS
        - Linux
        - iOS
        - Android
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: 环境信息
      description: 系统、设备和应用版本。布局相关问题时可补充横竖方向、缩放或窗口大小。
      value: |
        系统版本：
        设备型号：
        应用版本或提交：
        安装来源或构建方式：
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: 问题区域
      options:
        - 启动与系统集成
        - 全局导航与搜索
        - 境场
        - 资料库
        - 小说与阅读
        - 音乐与播放
        - 来源与规则
        - 文件、权限或原生能力
        - 其他
    validations:
      required: true

  - type: textarea
    id: media-context
    attributes:
      label: 媒体与来源（可选）
      description: 阅读、解析、下载或播放问题时填写。说明媒体类型、来源类型、问题阶段。不要粘贴未脱敏配置。
      placeholder: 小说；本地测试来源；打开章节时；多数书籍可复现

  - type: textarea
    id: evidence
    attributes:
      label: 截图、录屏或脱敏日志（可选）
      description: 能直接说明问题的证据。日志只保留问题前后相关片段。

  - type: textarea
    id: additional
    attributes:
      label: 其他补充（可选）
      description: 复现频率、临时绕过方式，或不同系统上的对比。
