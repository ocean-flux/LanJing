name: 维护者：开发任务
description: 从需求说明中拆出可在一个工作上下文完成、可独立验证的纵向任务
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        本表单面向维护者。一个任务只交付一项可以独立验证的完整结果，不按前端、后端或测试分层拆分。

  - type: input
    id: requirement
    attributes:
      label: 关联需求
      description: 填写上级需求编号，例如 #123；没有时填写“无”。
      placeholder: '#123'
    validations:
      required: true

  - type: textarea
    id: reason
    attributes:
      label: 为什么要做
      description: 用一段话说明这个任务解决哪个使用困难，以及它在上级需求中的位置。
    validations:
      required: true

  - type: textarea
    id: outcome
    attributes:
      label: 完成后的体验
      description: 从用户或系统观察者角度说明完成后新增的端到端能力。
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: 本任务负责什么
      description: 分别列出本任务负责和明确不负责的内容，确保工作量适合一个工作上下文。
      placeholder: |
        负责：
        - ……

        不负责：
        - ……
    validations:
      required: true

  - type: dropdown
    id: surfaces
    attributes:
      label: 影响范围
      multiple: true
      options:
        - 全局壳层与导航
        - 桌面端 / Windows、macOS、Linux
        - 移动端 / iOS、Android
        - 境场与资料库
        - 小说与阅读器
        - 音乐与播放
        - 来源与规则工具
        - 数据模型或持久化
        - 本地化、可访问性或性能

  - type: textarea
    id: constraints
    attributes:
      label: 需要保持的约束
      description: 写明本任务涉及的数据所有权、领域边界、兼容性和禁止事项；没有新增约束时写“继承关联需求”。
      placeholder: 继承关联需求
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: 验收场景
      description: 每条都要能观察和判定，并覆盖本任务相关的正常、边界、空状态或失败状态。
      placeholder: |
        - [ ] 用户在……时能够……
        - [ ] 当没有……时，界面……
    validations:
      required: true

  - type: textarea
    id: verification
    attributes:
      label: 如何验证
      description: 指明最高价值测试边界、自动化状态和必要人工确认；不要只写“补充测试”。
      placeholder: |
        主要测试边界：……
        自动化覆盖：……
        人工确认：……
    validations:
      required: true

  - type: textarea
    id: dependencies
    attributes:
      label: 前置任务
      description: 只列真正阻止本任务开始的编号；没有时填写“无，可立即开始”。
      placeholder: |
        - #123
    validations:
      required: true

  - type: textarea
    id: done
    attributes:
      label: 完成标准
      description: 除行为验收外，还必须通过哪些质量门？
      placeholder: |
        - [ ] 相关自动化测试通过
        - [ ] 静态检查通过
        - [ ] 本地化、可访问性和生产数据边界符合关联需求
    validations:
      required: true

  - type: checkboxes
    id: quality
    attributes:
      label: 发布前确认
      options:
        - label: 这是完整纵向任务，不是单独的前端、后端或测试工作
          required: true
        - label: 工作量适合一个工作上下文完成，并能独立验证
          required: true
        - label: 中文表达自然，没有机械翻译英文模板
          required: true
        - label: 正文不包含内部工具调用、提示词或执行指令
          required: true
        - label: 前置任务只包含真正阻止本任务开始的依赖
          required: true
